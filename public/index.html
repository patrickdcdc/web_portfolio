<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!--Primary SEO-->
    <title>Patrick Mutua | Full-stack Software Developer</title>
    <meta
      name="description"
      content="Patrick Mutua is a full-stack software developer based in Nairobi, Kenya. I build clean, scalable, and reliable web applications using MERN stack."
    />
    <meta
      name="keywords"
      content="Patrick Mutua, software developer, full-stack developer, MERN stack, React developer, Nairobi, Kenya"
    />
    <meta name="author" content="Patrick Mutua" />

    <!--Open Graph(controls how your link looks when shared on whatsapp, Linkedin, twitter)-->
    <meta
      property="og:title"
      content="Patrick Mutua | Full-Stack Software Developer"
    />
    <meta
      property="og:description"
      content="I build clean, scalable, and reliable web applications using the MERN stack."
    />
    <meta property="og:url" content="https://patrickmm.dev" />
    <meta property="og:type" content="website" />
    <meta
      property="og:image"
      content="https://patrickmm.dev/images/og-preview.png"
    />

    <!--Twitter card-->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Patrick Mutua | Full-Stack Software Developer"
    />
    <meta
      name="twitter:description"
      content="Full-stack developer building clean, scalable web apps."
    />

    <!--Canonical URL (Tells google this is the official URL)-->
    <link rel="canonical" href="https://patrickmm.dev/" />

    <meta name="theme-color" content="#000000" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>My portfolio</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.

    -->
  </body>
</html>
